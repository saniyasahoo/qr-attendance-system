<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Attendance</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Custom theme -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#5B5FEF'
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-gray-50 flex items-center justify-center min-h-screen">

<div class="w-full max-w-md">

    <!-- Logo / Icon -->
    <div class="flex justify-center mb-4">
        <div class="bg-indigo-100 p-4 rounded-2xl">
            🔳
        </div>
    </div>

    <!-- Title -->
    <h1 class="text-center text-2xl font-bold text-gray-800">
        Smart Attendance
    </h1>
    <p class="text-center text-gray-500 text-sm mb-6">
        QR-based attendance system
    </p>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-lg p-6">

        <!-- Secure badge -->
        <div class="bg-indigo-50 text-indigo-600 text-sm px-4 py-2 rounded-xl mb-5 text-center">
            🔒 Secure Teacher Portal
        </div>

        <form method="POST" class="space-y-4">

            <!-- Teacher ID -->
            <div>
                <label class="text-sm text-gray-600">Teacher ID</label>
                <input name="teacher_id" required
                    class="w-full mt-1 px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary outline-none"
                    placeholder="Enter your teacher ID">
            </div>

            <!-- Password -->
            <div>
                <label class="text-sm text-gray-600">Password</label>
                <input type="password" name="password" required
                    class="w-full mt-1 px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary outline-none"
                    placeholder="Enter your password">
            </div>

            <!-- Button -->
            <button type="submit"
                class="w-full bg-primary text-white py-3 rounded-xl font-semibold hover:opacity-90 transition">
                Sign In
            </button>

        </form>

        <!-- Footer -->
        <div class="text-center mt-5 text-sm text-gray-500">
            I'm a student →
            <a href="/student" class="text-primary font-medium">
                Mark Attendance
            </a>
        </div>

    </div>

    <!-- Bottom note -->
    <p class="text-center text-xs text-gray-400 mt-4">
        Protected by browser fingerprinting & session tokens
    </p>

</div>

</body>
</html>
