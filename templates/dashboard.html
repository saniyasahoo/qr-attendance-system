<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 flex items-center justify-center h-screen">

<div class="bg-white p-8 rounded-2xl shadow-lg w-[400px]">

    <h2 class="text-xl font-semibold mb-1">Class Details</h2>
    <p class="text-gray-500 text-sm mb-6">Set up your attendance session</p>

    <form method="POST" class="space-y-4">
        <div>
    <label class="text-sm">YEAR</label>
    <select name="year"
        class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500">
        
        <option value="2021">1st (2021)</option>
        <option value="2022">2nd (2022)</option>
        <option value="2023">3rd (2023)</option>
        <option value="2024">4th (2024)</option>
    </select>
</div>
        <div>

            <label class="text-sm">Subject Name</label>
            <input name="subject"
                class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500"
                placeholder="Enter subject">
        </div>

        <div class="flex gap-3">
            <div class="flex-1">
                <label class="text-sm">Branch</label>
                <select name="branch"
                    class="w-full mt-1 px-4 py-2 border rounded-lg">
                    <option>CSE</option>
                    <option>ECE</option>
                </select>
            </div>

            <div class="flex-1">
                <label class="text-sm">Section</label>
                <select name="section"
                    class="w-full mt-1 px-4 py-2 border rounded-lg">
                    <option>A</option>
                    <option>B</option>
                </select>
            </div>
        </div>

        <button class="w-full bg-indigo-600 text-white py-3 rounded-lg font-semibold">
            Start Session →
        </button>

    </form>

</div>

</body>
</html>
